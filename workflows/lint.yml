name: Lint

on:
  push:
    branches: [ main ]
    paths:
      - 'prompts/**'
      - 'tools/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # permite correr manualmente a partir do GitHub

jobs:
  lint:
    name: Validar prompts
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint estrutural (4 verificações sobre o core)
        run: python3 tools/lint_core.py

      - name: Auditoria de regressões V24
        run: python3 tools/audit_v24_regressoes.py

      - name: Build do core.md monolítico
        run: |
          python3 tools/build.py
          ls -la core.md
          echo "---"
          wc -l core.md

      - name: Upload do core.md como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: core-md
          path: core.md
          retention-days: 30
